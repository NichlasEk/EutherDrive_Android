<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320">
  <title>EutherDrive — Cartridge Mark</title>

  <rect x="20" y="20" width="600" height="280" rx="48" fill="#1d2021"></rect>

  <!-- Cartridge top notch -->
  <path d="M180 20 H460 V62 C460 76 448 88 434 88 H206 C192 88 180 76 180 62 Z" fill="#282828"></path>

  <!-- “Label” -->
  <rect x="92" y="110" width="456" height="120" rx="28" fill="#32302f"></rect>

  <!-- ED monogram (compact) -->
  <g fill="none" stroke="#ebdbb2" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M160 140 V210"></path>
    <path d="M160 140 H222"></path>
    <path d="M160 175 H210"></path>
    <path d="M160 210 H222"></path>

    <path d="M260 140 V210"></path>
    <path d="M260 140 H292"></path>
    <path d="M292 140 C330 140 346 160 346 175 C346 190 330 210 292 210 H260"></path>
  </g>

  <!-- “Drive port” -->
  <g>
    <rect x="420" y="150" width="110" height="50" rx="14" fill="#1d2021"></rect>
    <rect x="438" y="167" width="74" height="16" rx="8" fill="#fe8019"></rect>
  </g>

  <!-- Small accent line -->
  <rect x="92" y="242" width="456" height="8" rx="4" fill="#fe8019"></rect>
</svg>
